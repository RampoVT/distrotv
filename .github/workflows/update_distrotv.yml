name: Update DistroTV Playlist and EPG

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # Updated to a more recent stable version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Prepare Git
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Pull Latest Changes
        run: git pull origin main --rebase || true  # Allow if no changes

      - name: Run Scraper (create scraper.py if needed)
        run: python scraper.py || echo "Scraper script missing or failed - check repo"

      - name: Commit and Push Updates
        run: |
          git add distrotv.m3u distrotv_epg.xml distrotv_channels.json || true
          git commit --allow-empty -m "Auto Update DistroTV Playlist: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push origin main --force-with-lease || echo "No changes to push or push failed"
