name: Update DistroTV Playlist and EPG

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.31.0 typing-extensions==4.7.1

      - name: Run Scraper
        run: python scraper.py

      - name: Deploy to Repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add distrotv_channels.json distrotv.m3u distrotv_epg.xml
          
          # Force the commit to happen to keep tokens fresh
          git commit --allow-empty -m "Updated DistroTV Streams: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          
          git push
